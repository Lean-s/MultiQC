name: Fix linting
on:
  issue_comment:
    types: [created]

permissions:
  contents: read

jobs:
  fix_linting:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Only run if comment is on a PR with the main repo, and if it contains the magic keywords
    if: >
      github.repository_owner == 'MultiQC' &&
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '@multiqc-bot fix linting')

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.MQC_BOT_GITHUB_TOKEN }}
          persist-credentials: false

      # Action runs on the issue comment, so we don't get the PR by default.
      # Use the GitHub CLI to check out the PR:
      - name: Checkout Pull Request
        env:
          GITHUB_TOKEN: ${{ secrets.MQC_BOT_GITHUB_TOKEN }}
        run: gh pr checkout ${{ github.event.issue.number }}

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install prek
        uses: j178/prek-action@6ad80277337ad479fe43bd70701c3f7f8aa74db3 # v2.0.3
        with:
          install-only: true

      - name: Run prek
        run: |
          prek run --all-files || true

      - name: Check if any files changed
        run: |
          git diff --exit-code || echo "changed=YES" | tee -a $GITHUB_ENV

      - name: Commit and push changes
        if: env.changed == 'YES'
        run: |
          git config user.name 'MultiQC Bot'
          git config user.email 'multiqc-bot@seqera.io'
          git config push.default upstream
          git add .
          git status
          git commit -m "[automated] Fix code linting"
          git push
